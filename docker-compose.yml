services:
  database:
    image: postgres:16-alpine
    container_name: skasow_database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skasow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - database_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-skasow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: skasow_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@database:5432/${POSTGRES_DB:-skasow}?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_at_least_32_chars}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN_DAYS: ${JWT_REFRESH_EXPIRES_IN_DAYS:-30}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_LIMIT: ${RATE_LIMIT_LIMIT:-100}
      UPLOAD_DIR: /app/uploads
    ports:
      - "${BACKEND_PORT:-3001}:3000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: skasow_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:3000"
    depends_on:
      - backend

volumes:
  database_data:
  backend_uploads:
